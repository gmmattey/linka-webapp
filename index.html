<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon multi-formato: ICO p/ legacy + PNGs para Chrome/Firefox (2026-05). -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF7" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Linka Speedtest — meça a qualidade real da sua internet com clareza." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Linka" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Apple touch icons (audit 2026-05): apontamentos corretos por size.
         O 180×180 é o tamanho de produção para iPhone moderno; 152/167
         cobrem iPad. Antes (bug): apple-touch-icon apontava para
         /icon-maskable-192.png — tamanho errado E maskable (que iOS
         renderiza com cantos quadrados). -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/touch-icon/ios/AppIcon@2x~ipad.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/touch-icon/ios/AppIcon-83.5@2x~ipad.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/touch-icon/ios/AppIcon@2x.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <title>Linka Speedtest</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
