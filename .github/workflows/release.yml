# Release - Linka WebApp PWA
#
# Dispara em tags `v*`.
# Escopo deste repositorio: build do PWA e deploy do `dist/` no Cloudflare Pages.
# Android, APK, Gradle, keystore e Capacitor pertencem a outro projeto.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  pwa:
    name: PWA build + Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

      - name: Build PWA
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT || 'linka-speedtest' }} --branch=main
